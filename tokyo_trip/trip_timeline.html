<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>可編輯旅行時程｜東京 2026</title><style>
:root{--ink:#172033;--muted:#64748b;--line:#dce5ee;--teal:#0f766e}*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif}.trip-nav{position:sticky;top:0;z-index:9;display:flex;justify-content:center;flex-wrap:wrap;gap:5px 12px;padding:9px;background:#fffc;border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.trip-nav a{padding:3px 7px;border-radius:99px;color:#475569;text-decoration:none;font-size:.78rem;font-weight:700}.trip-nav a[aria-current],.trip-nav a:hover{background:#dff5ef;color:#0f766e}header{padding:28px 20px;color:#fff;background:linear-gradient(135deg,#0f766e,#155e75);text-align:center}h1{margin:0;font-size:1.65rem}header p{margin:5px 0 0;font-size:.85rem;opacity:.9}main{max-width:1180px;margin:auto;padding:18px}.tip{margin:0 0 12px;padding:11px 14px;border-left:4px solid var(--teal);border-radius:0 9px 9px 0;background:#ecfdf5;color:#35605c;font-size:.83rem}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:12px 0}.toolbar span{font-size:.78rem;color:var(--muted)}button{border:0;border-radius:8px;padding:8px 11px;background:#e8eef5;color:#334155;font:inherit;font-size:.78rem;font-weight:700;cursor:pointer}button.primary{background:var(--teal);color:#fff}.board{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 8px 22px #2030500c}.head,.task-row{min-width:960px;display:grid;grid-template-columns:225px 1fr}.head{position:sticky;top:0;z-index:4;background:#f8fafc;border-bottom:1px solid var(--line)}.head>div{padding:11px 7px;border-left:1px solid #edf2f7;text-align:center;color:var(--muted);font-size:.67rem}.head .name{padding-left:14px;border-left:0;text-align:left;font-size:.78rem;font-weight:800;color:#334155}.days{position:relative;display:grid;grid-template-columns:repeat(16,1fr)}.days i{height:41px;border-left:1px solid #edf2f7}.task-row{min-height:68px;border-bottom:1px solid #edf2f7}.task-row:last-child{border:0}.task-cell{display:flex;align-items:center;gap:7px;padding:8px 10px;border-right:1px solid var(--line);background:#fff}.task-cell textarea{width:100%;min-height:42px;resize:vertical;border:1px solid transparent;border-radius:7px;padding:6px;color:var(--ink);font:inherit;font-size:.8rem;font-weight:700;line-height:1.35}.task-cell textarea:focus{outline:0;border-color:#8bcfc3;background:#f0fdfa}.delete{display:none;padding:5px 7px;color:#b91c1c;background:#fff1f2}.edit .delete{display:block}.timeline{position:relative;display:grid;grid-template-columns:repeat(16,1fr);min-height:68px;background:repeating-linear-gradient(90deg,transparent 0,transparent calc(6.25% - 1px),#edf2f7 calc(6.25% - 1px),#edf2f7 6.25%)}.bar{grid-row:1;align-self:center;z-index:2;position:relative;height:29px;margin:0 4px;border-radius:7px;background:var(--color);box-shadow:0 3px 8px color-mix(in srgb,var(--color),transparent 72%);cursor:grab;touch-action:none}.bar:active{cursor:grabbing}.bar span{display:block;overflow:hidden;padding:6px 9px;color:#fff;text-overflow:ellipsis;white-space:nowrap;font-size:.68rem;font-weight:800}.bar b{position:absolute;right:0;top:0;width:10px;height:100%;cursor:ew-resize}.bar b:after{position:absolute;content:"";top:7px;bottom:7px;right:3px;border-right:2px solid #fffc}.edit .bar{outline:2px solid #fff;outline-offset:1px}.add-row{margin-top:12px}.hidden{display:none}@media(max-width:600px){main{padding:12px}.toolbar{align-items:flex-start;flex-direction:column}.trip-nav{gap:3px 6px}.trip-nav a{font-size:.7rem;padding:3px 5px}}
.details{display:block!important;color:#0f766e;background:#ecfdf5}.detail{display:none;margin-top:7px;padding:7px;border-radius:6px;background:#f8fafc;color:#52616f;font-size:.72rem;font-weight:400;line-height:1.45}.task-cell.expanded{display:block}.task-cell.expanded .detail{display:block}</style></head><body><nav class="trip-nav"><a href="index.html">入口</a><a href="tokyo_rail.html">鐵路</a><a href="transportation_guide.html">交通</a><a href="attractions_guide.html">景點</a><a href="trip_timeline.html" aria-current="page">時程</a><a href="packing_checklist.html">清單</a><a href="japanese_phrases.html">日語</a><a href="emergency_guide.html">緊急</a></nav><header><h1>📅 可編輯旅行時程</h1><p>點文字修改；開啟編輯後，拖曳色塊移動，拉右側把手調整天數。</p></header><main><p class="tip"><strong>提示：</strong>此頁的修改會自動存在目前瀏覽器。若要保留到其他裝置，請按「匯出 JSON」下載備份；按「重設」可回到預設行程。</p><div class="toolbar"><span id="status">已載入預設時程</span><div><button id="edit">✏️ 編輯區塊</button><button id="export">⇩ 匯出 JSON</button><button id="reset">↺ 重設</button></div></div><div class="board"><div class="head"><div class="name">任務／日期</div><div class="days" id="dates"></div></div><section id="rows"></section></div><button class="add-row primary">＋ 新增任務</button></main><script>
const key='tokyo-trip-timeline-v3',dates=['7/10','7/11','7/12','7/13','7/14','7/15','7/16','7/17','7/18','7/19','7/20','7/21','7/22','7/23','7/24','7/25'];let edit=false,drag=null;
const defaults=[['住宿最終確認',1,3,'#0f766e'],['eSIM、支付、Visit Japan Web',1,5,'#0f766e'],['確認護照有效期限',1,2,'#2563eb'],['飯店訂房確認',4,6,'#2563eb'],['準備行李、換現金與離線資料、個人藥品儲備、下載 Google 離線地圖與日文翻譯、列印／儲存所有訂房確認與機票',7,3,'#7c3aed'],['機票線上報到',8,2,'#2563eb'],['購買 SUICA、電車車票（如有需要）、購買保險',10,2,'#2563eb']];
const make=()=>defaults.map((x,i)=>({id:Date.now()+i,text:x[0],color:x[3],blocks:[{id:Date.now()+i,start:x[1],span:x[2]}]}));let data=JSON.parse(localStorage.getItem(key)||'null')||make();data.forEach(t=>t.blocks||(t.blocks=[{id:Date.now(),start:t.start||1,span:t.span||1}]));
const datesEl=document.querySelector('#dates'),rows=document.querySelector('#rows'),status=document.querySelector('#status');dates.forEach((d,i)=>datesEl.insertAdjacentHTML('beforeend',`<i ${i===0?'style="background:#fff7ed"':''}>${d}</i>`));const short=t=>t.text.length>13?t.text.slice(0,13)+'…':t.text;const sort=()=>data.sort((a,b)=>Math.min(...a.blocks.map(x=>x.start))-Math.min(...b.blocks.map(x=>x.start)));function save(){sort();localStorage.setItem(key,JSON.stringify(data));status.textContent='已依開始日期排序並自動儲存';}function render(){sort();rows.innerHTML='';data.forEach(t=>{const row=document.createElement('div');row.className='task-row';const bars=t.blocks.map(b=>`<div class="bar" data-id="${b.id}" style="--color:${t.color};grid-column:${b.start}/span ${b.span}"><span title="${t.text}">${short(t)}</span><b title="拖曳調整長度"></b></div>`).join('');row.innerHTML=`<div class="task-cell"><textarea aria-label="任務名稱">${t.text}</textarea><button class="details">詳情</button><button class="segment">＋區塊</button><button class="delete">×</button><div class="detail">${t.text}</div></div><div class="timeline">${bars}</div>`;const ta=row.querySelector('textarea');ta.oninput=()=>{t.text=ta.value;row.querySelector('.detail').textContent=t.text;row.querySelectorAll('.bar span').forEach(x=>{x.textContent=short(t);x.title=t.text});save()};row.querySelector('.details').onclick=()=>row.querySelector('.task-cell').classList.toggle('expanded');row.querySelector('.segment').onclick=()=>{t.blocks.push({id:Date.now(),start:1,span:1});save();render()};row.querySelector('.delete').onclick=()=>{data=data.filter(x=>x.id!==t.id);save();render()};row.querySelectorAll('.bar').forEach(bar=>{const b=t.blocks.find(x=>String(x.id)===bar.dataset.id);bar.onpointerdown=e=>startDrag(e,b,bar,e.target.tagName==='B'?'resize':'move')});rows.append(row)});document.body.classList.toggle('edit',edit)}function startDrag(e,b,bar,mode){if(!edit)return;drag={b,bar,mode,x:e.clientX,start:b.start,span:b.span};bar.setPointerCapture(e.pointerId);bar.onpointermove=move;bar.onpointerup=end;bar.onpointercancel=end}function move(e){if(!drag)return;const w=drag.bar.parentElement.getBoundingClientRect().width/16,d=Math.round((e.clientX-drag.x)/w);if(drag.mode==='move')drag.b.start=Math.max(1,Math.min(17-drag.b.span,drag.start+d));else drag.b.span=Math.max(1,Math.min(17-drag.b.start,drag.span+d));drag.bar.style.gridColumn=`${drag.b.start}/span ${drag.b.span}`}function end(){if(drag){save();drag=null;render()}}document.querySelector('#edit').onclick=()=>{edit=!edit;document.querySelector('#edit').textContent=edit?'✓ 完成編輯':'✏️ 編輯區塊';render()};document.querySelector('.add-row').onclick=()=>{data.push({id:Date.now(),text:'新任務',color:'#2563eb',blocks:[{id:Date.now()+1,start:1,span:2}]});save();render()};document.querySelector('#reset').onclick=()=>{if(confirm('要清除所有自訂並回到新預設時程嗎？')){localStorage.removeItem(key);data=make();render();status.textContent='已重設'}};document.querySelector('#export').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='tokyo-trip-timeline.json';a.click();URL.revokeObjectURL(a.href)};render();
</script></body></html>
