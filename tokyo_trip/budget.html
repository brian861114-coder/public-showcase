<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f5f7"><title>旅費與分帳｜東京旅程</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="assets/site.css"><style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}.page{max-width:980px;margin:auto;padding:56px 20px 90px}h1{margin:0;font-size:clamp(2.2rem,6vw,4.5rem);text-wrap:balance}header p{color:#6e6e73;text-wrap:pretty}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:34px 0}.metric,.panel{padding:24px;border:1px solid rgba(0,0,0,.08);border-radius:22px;background:#fff}.metric small{display:block;color:#6e6e73}.metric strong{font-size:1.5rem;font-variant-numeric:tabular-nums}.panel{margin-top:16px}form{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px}input,select,button{min-height:44px;padding:0 12px;border:1px solid #d2d2d7;border-radius:10px;background:#fff;font:inherit}button{border-color:#0071e3;color:#fff;background:#0071e3;font-weight:650;cursor:pointer}.table-wrap{overflow-x:auto}table{width:100%;margin-top:18px;border-collapse:collapse}th,td{padding:12px 8px;border-bottom:1px solid #e5e5e7;text-align:left;font-size:.88rem}td:nth-child(3),td:nth-child(4){font-variant-numeric:tabular-nums}.empty{padding:30px 0;color:#6e6e73;text-align:center}.delete{min-height:34px;padding:0 10px;border-color:#d2d2d7;color:#b42318;background:#fff}@media(max-width:700px){.summary{grid-template-columns:1fr}.summary .metric{padding:18px}form{grid-template-columns:1fr 1fr}form input:first-child{grid-column:1/-1}}
</style></head><body><nav class="trip-nav" aria-label="旅程工具"><a href="index.html">入口</a><a href="trip_timeline.html">行程</a><a href="transportation_guide.html">移動</a><a href="attractions_guide.html">景點</a><a href="packing_checklist.html">行前</a><a href="emergency_guide.html">緊急</a><a href="search.html">搜尋</a></nav><main class="page"><header><h1>旅費與分帳</h1><p>記錄日圓支出、自動換算台幣，並查看每位同行者應付金額。資料只保存在目前裝置。</p></header><section class="summary" aria-label="費用摘要"><div class="metric"><small>總支出</small><strong id="totalJpy">¥0</strong></div><div class="metric"><small>約合台幣</small><strong id="totalTwd">NT$0</strong></div><div class="metric"><small>每人平均</small><strong id="average">¥0</strong></div></section><section class="panel"><h2>新增支出</h2><form id="expenseForm"><input name="name" required maxlength="60" placeholder="項目，例如：晚餐" aria-label="支出項目"><input name="amount" required min="1" step="1" type="number" placeholder="日圓" aria-label="日圓金額"><select name="payer" aria-label="付款人"><option>Brian</option><option>同行者</option><option>共同</option></select><input name="people" min="1" max="20" value="2" type="number" aria-label="分攤人數"><button type="submit">加入</button></form><div class="table-wrap"><table><thead><tr><th>項目</th><th>付款人</th><th>金額</th><th>每人</th><th></th></tr></thead><tbody id="rows"></tbody></table></div><p id="empty" class="empty">尚無支出，先加入第一筆費用。</p></section></main><script src="assets/trip-data.js"></script><script src="assets/site.js" defer></script><script>
const key='tokyo-trip-expenses-v1',rate=.22;let expenses=JSON.parse(localStorage.getItem(key)||'[]');const money=n=>new Intl.NumberFormat('zh-TW').format(Math.round(n));function render(){const rows=document.querySelector('#rows');rows.innerHTML='';let total=0,totalShares=0;expenses.forEach(x=>{total+=x.amount;totalShares+=x.people;const tr=document.createElement('tr');tr.innerHTML=`<td></td><td></td><td>¥${money(x.amount)}</td><td>¥${money(x.amount/x.people)}</td><td><button class="delete" aria-label="刪除支出">刪除</button></td>`;tr.children[0].textContent=x.name;tr.children[1].textContent=x.payer;tr.querySelector('button').onclick=()=>{expenses=expenses.filter(e=>e.id!==x.id);save()};rows.append(tr)});document.querySelector('#totalJpy').textContent=`¥${money(total)}`;document.querySelector('#totalTwd').textContent=`NT$${money(total*rate)}`;document.querySelector('#average').textContent=`¥${money(totalShares?expenses.reduce((s,x)=>s+x.amount/x.people,0):0)}`;document.querySelector('#empty').hidden=expenses.length>0}function save(){localStorage.setItem(key,JSON.stringify(expenses));render()}document.querySelector('#expenseForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.currentTarget);expenses.push({id:Date.now(),name:f.get('name').trim(),amount:Number(f.get('amount')),payer:f.get('payer'),people:Number(f.get('people'))});e.currentTarget.reset();e.currentTarget.people.value=2;save()};render();
</script></body></html>
