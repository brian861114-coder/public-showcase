<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>全站搜尋與收藏｜東京旅程</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="assets/site.css"><style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}.page{max-width:880px;margin:auto;padding:56px 20px 90px}h1{margin:0;font-size:clamp(2.2rem,6vw,4.5rem);text-wrap:balance}.lead{color:#6e6e73;text-wrap:pretty}.search{width:100%;min-height:54px;margin:26px 0;padding:0 18px;border:1px solid #d2d2d7;border-radius:15px;background:#fff;font:inherit;font-size:1.05rem}.tabs{display:flex;gap:8px;margin-bottom:18px}.tabs button{min-height:38px;padding:0 14px;border:0;border-radius:999px;background:#e8e8ed;font:inherit;font-weight:650}.tabs button[aria-pressed="true"]{color:#fff;background:#1d1d1f}.result{display:grid;grid-template-columns:1fr auto;gap:16px;padding:20px 4px;border-bottom:1px solid #d2d2d7}.result a{color:inherit;text-decoration:none}.result h2{margin:0 0 4px;font-size:1.08rem}.result p{margin:0;color:#6e6e73;font-size:.9rem}.fav{width:42px;height:42px;border:1px solid #d2d2d7;border-radius:50%;background:#fff;font-size:1.1rem}.fav[aria-pressed="true"]{color:#fff;background:#0071e3;border-color:#0071e3}.empty{padding:44px 0;color:#6e6e73;text-align:center}
</style></head><body><nav class="trip-nav"><a href="index.html">入口</a><a href="search.html" aria-current="page">搜尋</a><a href="budget.html">旅費</a><a href="packing_checklist.html">清單</a><a href="emergency_guide.html">緊急</a></nav><main class="page"><h1>搜尋與收藏</h1><p class="lead">搜尋行程、交通、景點、日語及緊急資訊。收藏會保存在目前裝置並可離線查看。</p><input id="query" class="search" type="search" placeholder="搜尋河口湖、交通、護照…" autocomplete="off" aria-label="搜尋全站"><div class="tabs"><button data-mode="all" aria-pressed="true">全部</button><button data-mode="favorites" aria-pressed="false">已收藏</button></div><section id="results" aria-live="polite"></section></main><script src="assets/trip-data.js"></script><script src="assets/site.js" defer></script><script>
const key='tokyo-trip-favorites-v1';let mode='all';const getFav=()=>new Set(JSON.parse(localStorage.getItem(key)||'[]'));function render(){const q=document.querySelector('#query').value.trim().toLowerCase(),fav=getFav();const data=TRIP_DATA.search.filter(x=>(mode==='all'||fav.has(x[2]))&&(!q||x.join(' ').toLowerCase().includes(q)));const root=document.querySelector('#results');root.innerHTML='';if(!data.length){root.innerHTML='<p class="empty">沒有符合項目，換個關鍵字試試看。</p>';return}data.forEach(x=>{const row=document.createElement('article');row.className='result';row.innerHTML=`<a href="${x[2]}"><h2></h2><p></p></a><button class="fav" aria-label="收藏 ${x[0]}" aria-pressed="${fav.has(x[2])}">${fav.has(x[2])?'★':'☆'}</button>`;row.querySelector('h2').textContent=x[0];row.querySelector('p').textContent=x[1];row.querySelector('button').onclick=()=>{const f=getFav();f.has(x[2])?f.delete(x[2]):f.add(x[2]);localStorage.setItem(key,JSON.stringify([...f]));render()};root.append(row)})}document.querySelector('#query').oninput=render;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.tabs button').forEach(x=>x.setAttribute('aria-pressed',x===b));render()});render();
</script></body></html>
